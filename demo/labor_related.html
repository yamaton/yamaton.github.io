  Act:'#4e79a7', CabinetOrder:'#f28e2b', MinisterialOrdinance:'#e15759',
  Rule:'#76b7b2', ImperialOrder:'#59a14f', Constitution:'#edc948',
  Other:'#b07aa1'
};
var TJ = {
  Act:'法律', CabinetOrder:'政令',
  MinisterialOrdinance:'省令', Rule:'規則',
  ImperialOrder:'勅令', Constitution:'憲法',
  Other:'その他', Misc:'その他'
};
var EC = {
  cites:'#999', amends:'#e15759', repeals:'#333', delegation:'#f28e2b',
  ref:'#4e79a7', yomikae:'#76b7b2', junyo:'#59a14f', penalty:'#af7aa1',
  transitional:'#b07aa1', related:'#2a9d8f'
};
var ED = {
  cites:'', amends:'', repeals:'8,4', delegation:'',
  ref:'', yomikae:'4,4', junyo:'4,4', penalty:'8,4', transitional:'4,4',
  related:''
};
var EJ = {
  cites:'引用', amends:'改正', repeals:'廃止',
  delegation:'委任', ref:'参照',
  yomikae:'読替', junyo:'準用',
  penalty:'罰則', transitional:'経過措置',
  related:'関連'
};
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
var GP = [
  '#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f',
  '#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac',
  '#86bcb6','#8cd17d','#e377c2','#7f7f7f'
];
/* ── Shared SVG setup (runs once) ── */
var W = window.innerWidth, H = window.innerHeight;
var svg = d3.select('#graph');
var g = svg.append('g');
var zoomBehavior = d3.zoom().scaleExtent([0.1, 5])
  .on('zoom', function(e) { g.attr('transform', e.transform); });
svg.call(zoomBehavior);

var defs = svg.append('defs');
Object.keys(EC).forEach(function(t) {
  defs.append('marker').attr('id', 'a-' + t)
    .attr('viewBox', '0 0 10 10').attr('refX', 10).attr('refY', 5)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto-start-reverse')
    .append('path').attr('d', 'M0,0 L10,5 L0,10 z')
    .attr('fill', EC[t]);
});

var tip = d3.select('#tooltip');
function trunc(s, n) {
  return s && s.length > n ? s.substring(0, n) + '…' : s;
}

/* ── State ── */
var sim = null;
var fitTimer = null;
var familyLayout = 'tree';
var lastFamilyRoot = null;
var mmInstance = null;

function buildMarkmapTree(nodes, links, CC, CJ) {
  var treeLinks = links.filter(function(l) { return l._tree; });
  var childMap = {};
  nodes.forEach(function(n) { childMap[n.id] = []; });
  treeLinks.forEach(function(l) {
    if (childMap[l.source]) childMap[l.source].push(l.target);
  });
  var nMap = {};
  nodes.forEach(function(n) { nMap[n.id] = n; });
  var rn = nodes.find(function(n) { return n.is_root; });
  if (!rn) return null;
  function toMM(id) {
    var nd = nMap[id];
    if (!nd) return null;
    var color = CC[nd.family_role] || CC.other;
    var typLabel = TJ[nd.law_type] || '';
    var roleLabel = CJ[nd.family_role] || '';
    var html = '<span data-node-id="' + esc(nd.id) + '">';
    html += '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + color + ';margin-right:6px;vertical-align:middle"></span>';
    html += '<b>' + esc(nd.label) + '</b>';
    if (nd.abbrev) html += ' <span style="color:#888;font-size:0.85em">(' + esc(nd.abbrev) + ')</span>';
    var tags = [];
    if (typLabel) tags.push(typLabel);
    if (roleLabel && roleLabel !== '本法律') tags.push(roleLabel);
    if (nd.status) tags.push(nd.status);
    if (tags.length) html += ' <span style="color:#999;font-size:0.8em">' + tags.join(' \u00b7 ') + '</span>';
    html += '</span>';
    var children = (childMap[id] || []).map(toMM).filter(Boolean);
    return { content: html, children: children };
  }
  return toMM(rn.id);
}

/* ── Auto-fit helper ── */
function autoFit(ns) {
  var pad = 60;
  var mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;
  ns.forEach(function(d) {
    if (d.x < mnX) mnX = d.x; if (d.x > mxX) mxX = d.x;
    if (d.y < mnY) mnY = d.y; if (d.y > mxY) mxY = d.y;
  });
  if (mnX < mxX && mnY < mxY) {
    var dx = mxX - mnX + pad * 2, dy = mxY - mnY + pad * 2;
    var sc = Math.min(W / dx, (H - 50) / dy, 2);
    var tx = W / 2 - (mnX + mxX) / 2 * sc;
    var ty = (H + 50) / 2 - (mnY + mxY) / 2 * sc;
    svg.transition().duration(750).call(zoomBehavior.transform,
      d3.zoomIdentity.translate(tx, ty).scale(sc));
  }
}

/* ══════════════════════════════════════════════════════════════════════
   renderGraph(viewType) — main rendering function, called on view switch
   ══════════════════════════════════════════════════════════════════════ */
function renderGraph(viewType) {
  if (\!DATA) return;
  if (fitTimer) clearTimeout(fitTimer);
  if (sim) sim.stop();
  g.selectAll('*').remove();
  svg.transition().duration(0).call(zoomBehavior.transform, d3.zoomIdentity);
  d3.select('#graph').style('display', 'block');
  d3.select('#markmap-svg').style('display', 'none');

  var mode = DATA.meta.mode;
  var hasIntra = DATA.meta.has_intra;
  var isIntra = (viewType === 'intra');
  var dataset = isIntra
    ? DATA.intra
    : {nodes: DATA.nodes, edges: DATA.edges};
  if (!dataset || !dataset.nodes || dataset.nodes.length === 0) return;

  var nodes = dataset.nodes.map(function(d) { return Object.assign({}, d); });
  var links = dataset.edges.map(function(d) { return Object.assign({}, d); });

  /* Back button visibility */
  d3.select('#back-btn').style('display', isIntra ? 'inline-block' : 'none');

  /* ── Family layout (tree / graph toggle, early return) ── */
  if (!isIntra && mode === 'family') {
    if (DATA.meta.root_id !== lastFamilyRoot) {
      familyLayout = 'tree';
      lastFamilyRoot = DATA.meta.root_id;
    }
    var CC = {parent:'#4e79a7',enforcement_order:'#f28e2b',enforcement_rules:'#e15759',
              article_specific:'#76b7b2',transitional:'#b07aa1',other:'#bab0ac'};
    var CJ = {parent:'本法律',enforcement_order:'施行令',enforcement_rules:'施行規則',
              article_specific:'条文委任政省令',transitional:'改正関連',other:'その他'};
    function fNR(d){return d.is_input?14:8;}
    function fNC(d){return CC[d.family_role]||CC.other;}
    function fTip(n){
      var h='<b>'+esc(n.label)+'</b>';
      if(n.abbrev) h+=' <span class="tt-sub">('+esc(n.abbrev)+')</span>';
      var tags=[];
      if(TJ[n.law_type]) tags.push(TJ[n.law_type]);
      if(CJ[n.family_role]) tags.push(CJ[n.family_role]);
      if(n.status) tags.push(n.status);
      if(tags.length) h+='<br><span class="tt-sub">'+tags.join(' / ')+'</span>';
      if(n.law_num&&n.law_num!==n.label)
        h+='<br><span class="tt-detail">'+esc(n.law_num)+'</span>';
      if(n.enforcement_date)
        h+='<br><span class="tt-detail">施行日: '+esc(n.enforcement_date)+'</span>';
      if(n.article_count)
        h+='<br><span class="tt-detail">条文数: '+n.article_count+'</span>';
      return h;
    }

    if (familyLayout === 'tree') {
      /* ── Markmap tree layout ── */
      d3.select('#graph').style('display', 'none');
      var mmSvgEl = d3.select('#markmap-svg')
        .attr('width', W).attr('height', H)
        .style('display', 'block');
      var mmRoot = buildMarkmapTree(nodes, links, CC, CJ);
      if (!mmRoot) return;
      if (mmInstance) {
        mmInstance.setData(mmRoot).then(function() { mmInstance.fit(); });
      } else {
        mmInstance = markmap.Markmap.create(
          mmSvgEl.node(),
          { initialExpandLevel: -1, maxWidth: 300, fitRatio: 0.85 },
          mmRoot
        );
      }
      /* Tooltip via event delegation */
      var nMap = {};
      nodes.forEach(function(n) { nMap[n.id] = n; });
      mmSvgEl.on('mouseover.tip', function(e) {
        var el = e.target.closest('[data-node-id]');
        if (!el) return;
        var nd = nMap[el.getAttribute('data-node-id')];
        if (nd) tip.html(fTip(nd)).style('display', 'block');
      }).on('mousemove.tip', function(e) {
        if (tip.style('display') !== 'none')
          tip.style('left', (e.pageX + 12) + 'px').style('top', (e.pageY + 12) + 'px');
      }).on('mouseout.tip', function(e) {
        if (!e.relatedTarget || !e.relatedTarget.closest || !e.relatedTarget.closest('[data-node-id]'))
          tip.style('display', 'none');
      });
    } else {
      /* ── Force-directed graph layout ── */
      nodes.forEach(function(d){
        d.x=W/2+(Math.random()-0.5)*200;
        d.y=80+(d.depth||0)*180;
      });
      sim=d3.forceSimulation(nodes)
        .force('link',d3.forceLink(links).id(function(d){return d.id;}).distance(150))
        .force('charge',d3.forceManyBody().strength(-500))
        .force('collide',d3.forceCollide().radius(20))
        .force('y',d3.forceY(function(d){return 80+(d.depth||0)*180;}).strength(0.5))
        .force('x',d3.forceX(W/2).strength(0.05));
      var link=g.append('g').selectAll('line').data(links).join('line')
        .attr('stroke','#ccc').attr('stroke-width',1.5).attr('stroke-opacity',0.6);
      var node=g.append('g').selectAll('g').data(nodes).join('g')
        .call(d3.drag()
          .on('start',function(e,d){if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
          .on('drag',function(e,d){d.fx=e.x;d.fy=e.y;})
          .on('end',function(e,d){if(!e.active)sim.alphaTarget(0);}));
      node.append('circle')
        .attr('r',function(d){return fNR(d);})
        .attr('fill',function(d){return fNC(d);})
        .attr('stroke',function(d){return d.is_input?'#333':'#fff';})
        .attr('stroke-width',function(d){return d.is_input?3:1.5;})
        .style('cursor','grab');
      node.append('text').attr('class','node-label')
        .attr('x',function(d){return fNR(d)+4;}).attr('y',4)
        .text(function(d){return trunc(d.label,20);});
      node.on('mouseover',function(e,d){tip.html(fTip(d)).style('display','block');})
        .on('mousemove',function(e){tip.style('left',(e.pageX+12)+'px').style('top',(e.pageY+12)+'px');})
        .on('mouseout',function(){tip.style('display','none');});
      node.on('dblclick',function(e,d){d.fx=null;d.fy=null;sim.alphaTarget(0.1).restart();});
      if (typeof _onNodeClick === 'function') {
        node.style('cursor','pointer').on('click',function(e,d){
          if(\!d.is_input) _onNodeClick(d.label);
        });
      }
      sim.on('tick',function(){
        link.attr('x1',function(d){return d.source.x;})
          .attr('y1',function(d){return d.source.y;})
          .attr('x2',function(d){return d.target.x;})
          .attr('y2',function(d){return d.target.y;});
        node.attr('transform',function(d){return 'translate('+d.x+','+d.y+')';});
      });
      fitTimer=setTimeout(function(){autoFit(nodes);},1500);
    }

    /* ── Controls (shared) ── */
    var ctrl=d3.select('#controls'); ctrl.selectAll('*').remove();
    ctrl.append('h3').text('レイアウト');
    ctrl.append('button').attr('class','reset')
      .text(familyLayout==='tree'?'グラフ表示に切替':'ツリー表示に切替')
      .on('click',function(){
        familyLayout=familyLayout==='tree'?'graph':'tree';
        renderGraph('inter');
      });
    var ls=ctrl.append('div').attr('class','legend-section');
    ls.append('h3').text('分類');
    var cats=Array.from(new Set(nodes.map(function(d){return d.family_role;})));
    cats.forEach(function(c){
      var it=ls.append('div').attr('class','legend-item');
      it.append('span').attr('class','legend-circle').style('background',CC[c]||CC.other);
      it.append('span').text(CJ[c]||c);
    });
    ctrl.append('div').attr('class','stats').text(nodes.length+' 法令');
    ctrl.append('button').attr('class','reset').text('表示リセット')
      .on('click',function(){
        if (familyLayout==='tree' && mmInstance) { mmInstance.fit(); }
        else { svg.transition().duration(500).call(zoomBehavior.transform,d3.zoomIdentity); }
      });
    return;
  }

  /* ── Node radius ── */
  var relMaxT = (mode==='related') ? d3.max(nodes.filter(function(n){return n.node_role==='density';}),function(n){return n.total;})||1 : 1;
  function nodeR(d) {
    if (d.is_overflow) return 6;
    if (isIntra) return 8;
    if (mode==='related') {
      if (d.is_root) return 20;
      if (d.node_role==='density') return 8+8*Math.sqrt((d.total||0)/relMaxT);
      return 7;
    }
    if (d.is_root) return 18;
    return 10;
  }

  /* ── Group color map (article-xref) ── */
  var groupColor = {};
  var groupName = {};
  if (mode === 'article-xref') {
    var gkeys = Array.from(new Set(
      nodes.map(function(d) { return d.group; }).filter(Boolean)));
    gkeys.forEach(function(gk, i) {
      groupColor[gk] = GP[i % GP.length];
      var rep = nodes.find(function(d) { return d.group === gk; });
      groupName[gk] = rep ? (rep.law_name || gk) : gk;
    });
  }

  /* ── Node color ── */
  var RC = {density:'#2a9d8f',amending:'#e15759',repealed_by:'#333',repeals:'#333',root:null};
  function nodeColor(d) {
    if (d.is_overflow) return '#ddd';
    if (isIntra) return d.chapter_color || '#999';
    if (mode === 'related' && d.node_role && d.node_role !== 'root')
      return RC[d.node_role] || TC.Other;
    if (mode === 'article-xref' && d.group) return groupColor[d.group] || TC.Other;
    return TC[d.law_type] || TC.Other;
  }

  /* ── Initial positions ── */
  if (isIntra) {
    var maxOrd = d3.max(nodes, function(d) { return d.ordinal || 0; }) || 1;
    nodes.forEach(function(d) {
      d.x = W / 2 + (Math.random() - 0.5) * 200;
      d.y = 80 + ((d.ordinal || 0) / maxOrd) * (H - 160);
    });
  } else if (mode === 'amends') {
    var dates = nodes.filter(function(d) { return d.amend_date; })
      .map(function(d) { return new Date(d.amend_date); });
    if (dates.length > 0) {
      var timeScale = d3.scaleTime().domain(d3.extent(dates))
        .range([120, W - 120]);
      nodes.forEach(function(d) {
        if (d.is_root) { d.x = W - 80; d.y = H / 2; d.fx = W - 80; d.fy = H / 2; }
        else if (d.amend_date) {
          d.x = timeScale(new Date(d.amend_date));
          d.y = H / 2 + (Math.random() - 0.5) * 200;
        } else { d.x = 60; d.y = H / 2; }
      });
      g.append('g').attr('class', 'time-axis')
        .attr('transform', 'translate(0,' + (H - 50) + ')')
        .call(d3.axisBottom(timeScale).ticks(d3.timeYear.every(5))
          .tickFormat(d3.timeFormat('%Y')));
    }
  } else if (mode === 'related') {
    var rRoot = nodes.find(function(d){return d.is_root;});
    if (rRoot) { rRoot.x=W/2; rRoot.y=H/2; rRoot.fx=W/2; rRoot.fy=H/2; }
    var dNodes=nodes.filter(function(d){return d.node_role==='density';});
    dNodes.forEach(function(d,i){
      var a=(i/dNodes.length)*2*Math.PI - Math.PI/2;
      var r=120+80*(1-(d.total||0)/relMaxT);
      d.x=W/2+Math.cos(a)*r; d.y=H/2+Math.sin(a)*r;
    });
    var oNodes=nodes.filter(function(d){return !d.is_root && d.node_role!=='density';});
    oNodes.forEach(function(d,i){
      var a=(i/Math.max(oNodes.length,1))*2*Math.PI;
      d.x=W/2+Math.cos(a)*280; d.y=H/2+Math.sin(a)*280;
    });
  }

  /* ── Simulation ── */
  sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(function(d) { return d.id; })
      .distance(isIntra ? 50 : mode==='related' ? function(l){
        if(l.edge_type==='related') return 80+120*(1-(l.total||0)/relMaxT);
        return 200;
      } : 100))
    .force('charge', d3.forceManyBody()
      .strength(isIntra ? -60 : mode === 'amends' ? -100 : mode==='related' ? -300 : -200))
    .force('collide', d3.forceCollide()
      .radius(function(d) { return nodeR(d) + (isIntra ? 4 : 8); }));

  if (isIntra) {
    /* Chapter-based clustering */
    var chNums = Array.from(new Set(
      nodes.map(function(d) { return d.chapter_num || ''; })));
    if (chNums.length > 1) {
      var chAngle = {};
      chNums.forEach(function(ch, i) {
        chAngle[ch] = (i / chNums.length) * 2 * Math.PI;
      });
      var chR = Math.min(W, H) * 0.3;
      sim.force('cx', d3.forceX(function(d) {
        var a = chAngle[d.chapter_num || ''] || 0;
        return W / 2 + Math.cos(a) * chR;
      }).strength(0.12));
      sim.force('cy', d3.forceY(function(d) {
        var a = chAngle[d.chapter_num || ''] || 0;
        return H / 2 + Math.sin(a) * chR;
      }).strength(0.12));
    } else {
      sim.force('center', d3.forceCenter(W / 2, H / 2));
    }
  } else if (mode === 'amends') {
    sim.force('x', d3.forceX(function(d) { return d.x || W / 2; }).strength(0.3));
    sim.force('y', d3.forceY(H / 2).strength(0.05));
  } else if (mode === 'related') {
    sim.force('center', d3.forceCenter(W / 2, H / 2));
  } else if (mode === 'article-xref') {
    sim.force('center', d3.forceCenter(W / 2, H / 2));
    if (gkeys.length > 1) {
      var ga = {};
      gkeys.forEach(function(gp, i) {
        ga[gp] = (i / gkeys.length) * 2 * Math.PI;
      });
      var gr = Math.min(W, H) * 0.25;
      sim.force('gx', d3.forceX(function(d) {
        return d.is_root ? W / 2 : W / 2 + Math.cos(ga[d.group] || 0) * gr;
      }).strength(0.15));
      sim.force('gy', d3.forceY(function(d) {
        return d.is_root ? H / 2 : H / 2 + Math.sin(ga[d.group] || 0) * gr;
      }).strength(0.15));
    }
  } else {
    sim.force('center', d3.forceCenter(W / 2, H / 2));
  }

  if (!isIntra && mode === 'cites') {
    var root = nodes.find(function(d) { return d.is_root; });
    if (root) { root.fx = W / 2; root.fy = H / 2; }
  }

  /* ── Convex hulls for article-xref groups ── */
  var hullG = g.append('g').attr('class', 'hulls');
  var hullPaths = [];
  if (mode === 'article-xref' && Object.keys(groupColor).length > 1) {
    Object.keys(groupColor).forEach(function(gk) {
      var p = hullG.append('path')
        .attr('fill', groupColor[gk])
        .attr('fill-opacity', 0.08)
        .attr('stroke', groupColor[gk])
        .attr('stroke-opacity', 0.25)
        .attr('stroke-width', 1);
      hullPaths.push({key: gk, path: p});
    });
  }
  function updateHulls() {
    hullPaths.forEach(function(hp) {
      var pts = nodes.filter(function(d) { return d.group === hp.key; })
        .map(function(d) { return [d.x, d.y]; });
      if (pts.length >= 3) {
        var hull = d3.polygonHull(pts);
        if (hull) {
          var cx = d3.mean(hull, function(p) { return p[0]; });
          var cy = d3.mean(hull, function(p) { return p[1]; });
          var pad = 20;
          var expanded = hull.map(function(p) {
            var dx = p[0] - cx, dy = p[1] - cy;
            var dist = Math.sqrt(dx * dx + dy * dy) || 1;
            return [p[0] + dx / dist * pad, p[1] + dy / dist * pad];
          });
          hp.path.attr('d', 'M' + expanded.join('L') + 'Z');
        } else {
          hp.path.attr('d', '');
        }
      } else {
        hp.path.attr('d', '');
      }
    });
  }

  /* ── Render links ── */
  var link = g.append('g').selectAll('line').data(links).join('line')
    .attr('stroke', function(d) { return EC[d.edge_type] || '#999'; })
    .attr('stroke-dasharray', function(d) { return ED[d.edge_type] || ''; })
    .attr('stroke-width', function(d) {
      if (isIntra) return 1;
      if (mode==='related' && d.edge_type==='related') return 1.5+3*(d.total||0)/relMaxT;
      return 1.5;
    })
    .attr('stroke-opacity', isIntra ? 0.4 : 0.6)
    .attr('marker-end', function(d) {
      if (d.edge_type==='related') return '';
      return 'url(#a-' + d.edge_type + ')';
    });

  /* ── Render nodes ── */
  var node = g.append('g').selectAll('g').data(nodes).join('g')
    .call(d3.drag()
      .on('start', function(e, d) {
        if (!e.active) sim.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y; })
      .on('drag', function(e, d) { d.fx = e.x; d.fy = e.y; })
      .on('end', function(e, d) {
        if (!e.active) sim.alphaTarget(0); })
    );

  node.append('circle')
    .attr('r', function(d) { return nodeR(d); })
    .attr('fill', function(d) { return nodeColor(d); })
    .attr('stroke', function(d) {
      if (isIntra) return '#fff';
      return d.is_root ? '#333' : '#fff';
    })
    .attr('stroke-width', function(d) {
      if (isIntra) return 1;
      return d.is_root ? 3 : 1.5;
    })
    .style('cursor', 'grab');

  /* Drillable indicator on root node (inter view only) */
  if (!isIntra && hasIntra) {
    node.filter(function(d) { return d.is_root; })
      .append('circle')
      .attr('r', 9)
      .attr('fill', 'none')
      .attr('stroke', '#333')
      .attr('stroke-dasharray', '3,2')
      .attr('stroke-width', 1)
      .style('pointer-events', 'none');
  }

  node.append('text').attr('class', 'node-label')
    .attr('x', function(d) { return nodeR(d) + 4; }).attr('y', 4)
    .text(function(d) { return trunc(d.label, isIntra ? 20 : 14); });

  /* ── Double-click: drill down or unpin ── */
  node.on('dblclick', function(e, d) {
    e.preventDefault();
    if (!isIntra && d.is_root && hasIntra) {
      renderGraph('intra');
    } else {
      d.fx = null; d.fy = null;
      sim.alphaTarget(0.1).restart();
    }
  });

  /* ── Tooltips ── */
  node.on('mouseover', function(e, d) {
    var h = '<b>' + esc(d.label) + '</b>';
    if (isIntra) {
      if (d.caption) h += '<br><span class="tt-detail">' + esc(d.caption) + '</span>';
      if (d.chapter) h += '<br><span class="tt-sub">' + esc(d.chapter) + '</span>';
    } else {
      if (d.abbrev) h += '  <span class="tt-sub">(' + esc(d.abbrev) + ')</span>';
      if (d.law_name && d.law_name !== d.label) h += '<br>' + esc(d.law_name);
      var tags = [];
      if (TJ[d.law_type]) tags.push(TJ[d.law_type]);
      if (d.status) tags.push(esc(d.status));
      if (tags.length) h += '<br><span class="tt-sub">' + tags.join(' / ') + '</span>';
      if (d.law_num && d.law_num !== d.label && d.law_num !== d.law_name)
        h += '<br><span class="tt-detail">' + esc(d.law_num) + '</span>';
      if (d.enforcement_date)
        h += '<br><span class="tt-detail">施行日: ' + esc(d.enforcement_date) + '</span>';
      if (d.category)
        h += '<br><span class="tt-detail">分類: ' + esc(d.category) + '</span>';
      if (d.article_count)
        h += '<br><span class="tt-detail">本則条文数: ' + esc(d.article_count) + '</span>';
      if (d.node_role==='density') {
        h += '<br><span class="tt-detail">関連度: ' + d.density_rank + '位 (計' + d.total + '件)</span>';
        h += '<br><span class="tt-detail">引用 出→' + d.outgoing + ' 入←' + d.incoming + '</span>';
      }
      if (d.amend_date)
        h += '<br><span class="tt-detail">改正日: ' + esc(d.amend_date) + '</span>';
      if (d.provision_context === 'suppl')
        h += '<br><span class="tt-detail">附則</span>';
      if (d.is_root && hasIntra)
        h += '<br><span class="tt-drill">ダブルクリックで法令内を表示</span>';
    }
    tip.html(h).style('display', 'block');
  }).on('mousemove', function(e) {
    tip.style('left', (e.pageX + 12) + 'px')
       .style('top', (e.pageY + 12) + 'px');
  }).on('mouseout', function() { tip.style('display', 'none'); });

  link.on('mouseover', function(e, d) {
    var h = '<b>' + esc(EJ[d.edge_type] || d.edge_type) + '</b>';
    if (d.source_articles)
      h += '<br><span class="tt-detail">委任元: 第'
        + esc(d.source_articles).split(',').join('条, 第') + '条</span>';
    if (d.scope)
      h += '<br><span class="tt-detail">範囲: ' + esc(d.scope) + '</span>';
    if (d.amend_date)
      h += '<br><span class="tt-detail">改正日: ' + esc(d.amend_date) + '</span>';
    if (d.edge_type==='related')
      h += '<br><span class="tt-detail">出→' + d.outgoing + ' 入←' + d.incoming + ' 計' + d.total + '</span>';
    tip.html(h).style('display', 'block');
  }).on('mousemove', function(e) {
    tip.style('left', (e.pageX + 12) + 'px')
       .style('top', (e.pageY + 12) + 'px');
  }).on('mouseout', function() { tip.style('display', 'none'); });

  /* ── Tick ── */
  sim.on('tick', function() {
    link.attr('x1', function(d) { return d.source.x; })
      .attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) {
        var dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        return d.target.x - (dx / dist) * nodeR(d.target);
      })
      .attr('y2', function(d) {
        var dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        return d.target.y - (dy / dist) * nodeR(d.target);
      });
    node.attr('transform', function(d) {
      return 'translate(' + d.x + ',' + d.y + ')';
    });
    updateHulls();
  });

  /* ── Controls ── */
  var ctrl = d3.select('#controls');
  ctrl.selectAll('*').remove();

  /* Edge type checkboxes */
  var eTypes = Array.from(new Set(links.map(function(d) { return d.edge_type; })));
  if (eTypes.length > 0) {
    ctrl.append('h3').text('エッジ種別');
    eTypes.forEach(function(t) {
      var lab = ctrl.append('label');
      lab.append('input').attr('type', 'checkbox').property('checked', true)
        .on('change', function() {
          var vis = this.checked;
          link.filter(function(d) { return d.edge_type === t; })
            .style('display', vis ? null : 'none');
        });
      var sp = lab.append('span');
      sp.append('span').style('color', EC[t] || '#999').text(' ■ ');
      sp.append('span').text(EJ[t] || t);
    });
  }

  /* Legend */
  if (isIntra && DATA.meta.chapters && DATA.meta.chapters.length > 0) {
    var ls = ctrl.append('div').attr('class', 'legend-section');
    ls.append('h3').text('章');
    DATA.meta.chapters.forEach(function(ch) {
      var item = ls.append('div').attr('class', 'legend-item');
      item.append('span').attr('class', 'legend-circle')
        .style('background', ch.color);
      item.append('span').text(trunc(ch.title, 20));
    });
  } else if (mode === 'article-xref' && Object.keys(groupColor).length > 0) {
    var ls3 = ctrl.append('div').attr('class', 'legend-section');
    ls3.append('h3').text('法令');
    Object.keys(groupColor).forEach(function(gk) {
      var item = ls3.append('div').attr('class', 'legend-item');
      item.append('span').attr('class', 'legend-circle')
        .style('background', groupColor[gk]);
      item.append('span').text(trunc(groupName[gk] || gk, 24));
    });
  } else {
    var nTypes = Array.from(new Set(nodes.map(function(d) { return d.law_type; })))
      .filter(function(t) { return t !== 'Other' || nodes.some(
        function(d) { return d.law_type === 'Other' && !d.is_overflow; }); });
    if (nTypes.length > 0) {
      var ls2 = ctrl.append('div').attr('class', 'legend-section');
      ls2.append('h3').text('法令種別');
      nTypes.forEach(function(t) {
        var item = ls2.append('div').attr('class', 'legend-item');
        item.append('span').attr('class', 'legend-circle')
          .style('background', TC[t] || TC.Other);
        item.append('span').text(TJ[t] || t);
      });
    }
  }

  ctrl.append('div').attr('class', 'stats')
    .text(nodes.length + ' ノード / ' + links.length + ' エッジ'
      + (isIntra ? ' (法令内)' : ''));

  ctrl.append('button').attr('class', 'reset').text('表示リセット')
    .on('click', function() {
      svg.transition().duration(500)
        .call(zoomBehavior.transform, d3.zoomIdentity);
    });

  /* Auto-fit */
  fitTimer = setTimeout(function() { autoFit(nodes); }, 1500);
}

/* ── Back button ── */
d3.select('#back-btn').on('click', function() { renderGraph('inter'); });

renderGraph('inter');
</script>
</body>
</html>
